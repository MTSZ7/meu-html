<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eu sou bonito?</title>
    <link rel="icon" href="https://i.imgur.com/xmIkAy6.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            text-align: center;
            margin-top: 50px;
            background-color: #121212;
            color: #ffffff;
            user-select: none;
        }
        #pergunta {
            font-size: 28px;
            color: #ffffff;
            margin-bottom: 30px;
        }
        #botoes {
            display: flex;
            justify-content: center;
            gap: 30px;
        }
        button {
            padding: 12px 24px;
            font-size: 20px;
            border-radius: 5px;
            cursor: pointer;
            background-color: #1e1e1e;
            color: #ffffff;
            border: 1px solid #ffffff;
            transition: background-color 0.3s, transform 0.3s;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        button:hover {
            background-color: #333;
            transform: translateY(-2px);
        }
        #mensagem {
            display: none;
            margin-top: 30px;
            font-size: 20px;
            font-style: italic;
            color: rgb(235, 8, 197);
            animation: fadeIn 0.5s;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
    <script>
        function moverAleatorio() {
            var novoTop = Math.floor(Math.random() * (window.innerHeight - 100));
            var novoLeft = Math.floor(Math.random() * (window.innerWidth - 100));
            document.getElementById('nao').style.position = 'absolute';
            document.getElementById('nao').style.top = novoTop + 'px';
            document.getElementById('nao').style.left = novoLeft + 'px';
        }

        function exibirMensagem() {
            document.getElementById('mensagem').innerText = 'Você também é linda! Princesa ❤';
            document.getElementById('mensagem').style.display = 'block';
        }
    </script>
</head>
<body oncontextmenu="return false;">
    <div id="container">
        <h1 id="pergunta">Eu sou bonito?</h1>
        <div id="botoes">
            <button id="nao" onmouseover="moverAleatorio()">Não</button>
            <button onclick="exibirMensagem()">Sim</button>
        </div>
        <p id="mensagem"></p>
    </div>
</body>
</html>
